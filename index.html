<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Generator</title>

  <!-- QR Code Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #qrcode {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }

    footer {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>QR Code Generator</h2>

    <input
      type="text"
      id="qrText"
      placeholder="Enter text or website URL"
    />

    <button onclick="generateQR()">Generate QR Code</button>

    <div id="qrcode"></div>

    <footer>
      HTML • CSS • JavaScript
    </footer>
  </div>

  <script>
    function generateQR() {
      const text = document.getElementById("qrText").value;
      const qrContainer = document.getElementById("qrcode");

      qrContainer.innerHTML = "";

      if (text.trim() === "") {
        alert("Please enter text or a URL");
        return;
      }

      new QRCode(qrContainer, {
        text: text,
        width: 300,
        height: 300
      });
    }
  </script>

</body>
</html>
